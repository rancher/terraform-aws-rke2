name: Update Go Dependencies

on:
  schedule:
    - cron: '0 4 * * 1' # Every Monday at 04:00
  workflow_dispatch:

jobs:
  update-go-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.x'
          check-latest: true

      - name: Update Go version and dependencies
        working-directory: test
        run: ../.github/workflows/scripts/update-go-deps.sh

      - name: Commit and Push Changes
        id: git-push
        run: .github/workflows/scripts/commit-go-deps-changes.sh

      - name: Create Pull Request
        if: steps.git-push.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { default: script } = await import('${{ github.workspace }}/.github/workflows/scripts/create-pr.js');
            await script({ github, context });
